<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropIn Chat - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>DropIn Chat - Admin</h1>
    <!-- Centered room code display -->
    <div class="room-code-display-container">
      <h3 id="room-code-display">Login</h3>
    </div>
    
    <button id="dark-mode-toggle">Dark Mode</button>
  </header>

  <main>
    <div id="room-info">
      <label>Username:</label>
      <input type="text" id="username" placeholder="Enter username">
      <label>Password:</label>
      <input type="password" id="password" placeholder="Enter password">
      <button id="join-button" onclick="showPanel()">Log in</button>
    </div>

    <div id="panel-container">
        <!-- Create a grid of square cells, each 30vw x 30vw, and having a blue background with a small header inside -->
        <div class="room-card">
          <h2>Room Name 1</h2>
          <p><strong>Messages:</strong> 10</p>
          <button class="join-button">Join</button>
          <button class="delete-button">Delete</button>
        </div>
  
        <div class="room-card">
          <h3>Room Name 2</h3>
          <p>Messages: 5</p>
          <button class="join-button">Join</button>
          <button class="delete-button">Delete</button>
        </div>
    </div>
    <style>
      /* grid stuff */
      .room-card {
    display: inline-block;
    width: 30vw;
    height: 30vw;
    background-color: #3498db;
    margin: 10px;
    text-align: center;
    position: relative;
    color: #fff;
  }

  .room-card h2 {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
  }

  .room-card .room-details {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .room-card p {
    margin: 25% 0;
  }


  .room-card button {
    width: 45%;
    padding: 8px;
    margin: 5px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background-color: #fff;
    color: #3498db;
    font-size: 1em;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .room-card button:hover {
    background-color: #3498db;
    color: #fff;
  }
    </style>
  </main>
  <div class="alert red">
    <h3>This is a test alert</h3>
  </div>

  <!-- WebSocket functionality -->
  <script src="script.js"></script>
  <script src="ui.js"></script>

</body>
</html>
