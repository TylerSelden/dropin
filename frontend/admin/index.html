<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropIn Chat - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>DropIn Chat - Admin</h1>
    <!-- Centered room code display -->
    <div class="room-code-display-container">
      <h3 id="room-code-display">Login</h3>
    </div>
    
    <button id="dark-mode-toggle">Dark Mode</button>
  </header>

  <main>
    <div id="room-info">
      <label>Username:</label>
      <input type="text" id="username" placeholder="Enter username">
      <label>Password:</label>
      <input type="password" id="password" placeholder="Enter password">
      <button id="join-button" onclick="showPanel()">Log in</button>
    </div>

    <div id="panel-container">
        <!-- Create a grid of square cells, each 30vw x 30vw, and having a blue background with a small header inside -->
        <div class="room-card">
          <h2>Room #1</h2>
          <p><strong>Messages:</strong> 10</p>
          <p><strong>Last modified:</strong> Dec 21, 2023, 21:30</p>
          <div class="button-container">
            <button>Join</button>
            <button>Delete</button>
          </div>
        </div>
        <div class="room-card">
          <h2>Room #1</h2>
          <p><strong>Messages:</strong> 10</p>
          <p><strong>Last modified:</strong> Dec 21, 2023, 21:30</p>
          <div class="button-container">
            <button>Join</button>
            <button>Delete</button>
          </div>
        </div>
        <div class="room-card">
          <h2>Room #1</h2>
          <p><strong>Messages:</strong> 10</p>
          <p><strong>Last modified:</strong> Dec 21, 2023, 21:30</p>
          <div class="button-container">
            <button>Join</button>
            <button>Delete</button>
          </div>
        </div>
        <div class="room-card">
          <h2>Room #1</h2>
          <p><strong>Messages:</strong> 10</p>
          <p><strong>Last modified:</strong> Dec 21, 2023, 21:30</p>
          <div class="button-container">
            <button>Join</button>
            <button>Delete</button>
          </div>
        </div>
    </div>
    <style>
      /* panel container styling, room-cards will be a grid */
      /* make room-cards a grid */ 
      #panel-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(30vw, 1fr));
        grid-gap: 1rem;
        padding: 1rem;
        width: 100%;
      }

      .room-card {
        position: relative;
        width: 28vw;
        height: 20vw;
        background-color: #1e90ff;
        padding: 1rem;
        border-radius: 0.5rem;
        color: white;
        text-align: center;
        display: inline-block;
        margin: 1vw;
      }
      .room-card button {
        width: 45%;
        padding: 8px;
        margin: 5px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background-color: #2779af;
        color: #fff;
        font-size: 1em;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      /* darken color on hover */
      .room-card button:hover {
        background-color: #226a99;
      }
      .room-card button:active {
        background-color: #1e6190;
      }
      .button-container {
        position: absolute;
        bottom: 1vh;
        left: 0;
        width: 100%;
      }
    </style>
  </main>
  <div class="alert red">
    <h3>This is a test alert</h3>
  </div>

  <!-- WebSocket functionality -->
  <script src="script.js"></script>
  <script src="ui.js"></script>

</body>
</html>
